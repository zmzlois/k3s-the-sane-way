---
# This is a testing file to check how to configure /etc/hosts file to write all hosts
- name: Gather hostname records from inventory
  hosts: k3s_cluster
  gather_facts: true
  become: true
  tasks:
    - name: "Build hosts file"
      lineinfile: dest=/etc/hosts regexp='.*{{ item }}$' line="{{ hostvars[item].ansible_default_ipv4.address }} {{ hostvars[item].ansible_hostname }}" state=present
      when: hostvars[item].ansible_default_ipv4.address is defined
      with_items: "{{ groups['all'] }}"
